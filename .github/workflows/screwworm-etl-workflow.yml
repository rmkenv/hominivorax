name: Nightly ETL

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  etl:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch screwworm case data
        env:
          USDA_APHIS_API_KEY: ${{ secrets.USDA_APHIS_API_KEY }}
        run: python scripts/screwworm_scraper.py

      - name: Fetch cattle census data
        env:
          NASS_QUICKSTATS_API_KEY: ${{ secrets.NASS_QUICKSTATS_API_KEY }}
        run: python scripts/cattle_census_fetcher.py

      - name: Analyze hotspots and calculate risk
        run: python scripts/analyze_hotspots.py

      - name: Commit updated data
        run: |
          git config user.name  'ETL Bot'
          git config user.email 'etl-bot@users.noreply.github.com'
          git add public/data/hotspots.json public/data/cattle-census.json
          git diff --staged --quiet || git commit -m "chore: nightly data update [skip ci]"
          git push
